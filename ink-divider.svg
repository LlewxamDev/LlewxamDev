<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 86" width="860" height="86" role="img" aria-labelledby="title desc">
  <title id="title">Animated ink divider</title>
  <desc id="desc">Black and white ink brush divider for a frame-by-frame themed GitHub profile.</desc>
  <defs>
    <style>
      .paper { fill: #0A0610; }
      .ink { fill: #F2EAFB; }
      .rail { fill: #F2EAFB; }
      .hole { fill: #0A0610; }
      .line { stroke: #F2EAFB; stroke-width: 2; stroke-linecap: round; fill: none; }
      .small { font-family: 'Courier New', Courier, monospace; font-size: 11px; font-weight: 800; fill: #F2EAFB; letter-spacing: 3px; }
      @keyframes slide {
        0% { transform: translateX(-180px); opacity: 0; }
        20% { opacity: .9; }
        80% { opacity: .9; }
        100% { transform: translateX(900px); opacity: 0; }
      }
      @keyframes blink {
        0%, 100% { opacity: .25; }
        50% { opacity: 1; }
      }
      .wipe { animation: slide 4.2s linear infinite; }
      .b1 { animation: blink 2.1s steps(2, end) infinite; }
      .b2 { animation: blink 2.1s steps(2, end) .35s infinite; }
      .b3 { animation: blink 2.1s steps(2, end) .70s infinite; }
    </style>
  </defs>
  <rect class="paper" width="860" height="86"/>
  <rect class="rail" x="0" y="0" width="34" height="86"/>
  <rect class="rail" x="826" y="0" width="34" height="86"/>
  <rect class="hole" x="9" y="8" width="16" height="11"/>
  <rect class="hole" x="9" y="29" width="16" height="11"/>
  <rect class="hole" x="9" y="50" width="16" height="11"/>
  <rect class="hole" x="9" y="71" width="16" height="8"/>
  <rect class="hole" x="835" y="8" width="16" height="11"/>
  <rect class="hole" x="835" y="29" width="16" height="11"/>
  <rect class="hole" x="835" y="50" width="16" height="11"/>
  <rect class="hole" x="835" y="71" width="16" height="8"/>
  <path class="ink" d="M34 37C95 18 140 48 201 31C267 13 321 50 387 31C450 13 504 47 568 31C631 15 685 46 747 31C782 22 806 23 826 25V50C780 58 742 39 690 53C630 69 573 39 515 56C450 74 394 40 332 57C272 73 215 44 157 59C103 73 72 54 34 63Z"/>
  <path class="line" d="M54 24C120 44 162 15 228 37C288 56 342 18 410 39C472 57 535 22 603 39C663 55 720 27 786 42C802 46 814 45 826 42"/>
  <g class="wipe">
    <path class="ink" d="M34 34C72 22 108 42 145 31C187 18 221 43 258 29V56C215 66 185 44 144 59C104 72 69 52 34 62Z"/>
  </g>
  <circle class="ink b1" cx="118" cy="22" r="4"/>
  <circle class="ink b2" cx="422" cy="63" r="5"/>
  <circle class="ink b3" cx="734" cy="20" r="4"/>
  <text class="small" x="430" y="51" text-anchor="middle">FRAME A FRAME / INK CUT</text>
</svg>
