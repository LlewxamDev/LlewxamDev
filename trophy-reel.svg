<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 230" width="860" height="230" role="img" aria-labelledby="title desc">
  <title id="title">Animated trophy reel</title>
  <desc id="desc">Animated frame-by-frame trophy board for GitHub achievements in black and white ink style.</desc>
  <defs>
    <style>
      .paper { fill: #0A0610; }
      .ink { fill: #F2EAFB; }
      .card { fill: #0A0610; stroke: #F2EAFB; stroke-width: 2.2; }
      .shadow { fill: #F2EAFB; opacity: .12; }
      .title { font-family: 'Courier New', Courier, monospace; font-size: 26px; font-weight: 900; letter-spacing: 3px; fill: #F2EAFB; }
      .text { font-family: 'Courier New', Courier, monospace; font-size: 13px; font-weight: 900; fill: #F2EAFB; }
      .small { font-family: 'Courier New', Courier, monospace; font-size: 10px; font-weight: 900; fill: #F2EAFB; letter-spacing: 1px; }
      .white { fill: #0A0610; }
      .pink { fill: #C77DFF; }
      .cyan { fill: #7B2CBF; }
      .green { fill: #9D4EDD; }
      @keyframes lift {
        0%, 100% { opacity: .68; transform: translateY(0); }
        50% { opacity: 1; transform: translateY(-7px); }
      }
      @keyframes shine {
        0% { transform: translateX(-190px); opacity: 0; }
        25% { opacity: .85; }
        75% { opacity: .85; }
        100% { transform: translateX(900px); opacity: 0; }
      }
      @keyframes splat {
        0%, 100% { opacity: .25; transform: scale(.88); }
        50% { opacity: 1; transform: scale(1.12); }
      }
      .t1 { animation: lift 2.7s steps(2, end) infinite; }
      .t2 { animation: lift 2.7s steps(2, end) .18s infinite; }
      .t3 { animation: lift 2.7s steps(2, end) .36s infinite; }
      .t4 { animation: lift 2.7s steps(2, end) .54s infinite; }
      .t5 { animation: lift 2.7s steps(2, end) .72s infinite; }
      .t6 { animation: lift 2.7s steps(2, end) .90s infinite; }
      .wipe { animation: shine 4.7s linear infinite; }
      .s1 { animation: splat 2.9s steps(2, end) infinite; }
      .s2 { animation: splat 2.9s steps(2, end) .45s infinite; }
      .s3 { animation: splat 2.9s steps(2, end) .9s infinite; }
    </style>
  </defs>
  <rect class="paper" width="860" height="230"/>
  <path class="ink" d="M0 0H860V28C792 19 740 38 665 24C584 9 520 37 438 24C361 11 296 8 225 27C145 49 75 18 0 34Z"/>
  <path class="ink" d="M0 196C82 209 136 185 216 201C296 217 360 190 438 203C517 216 586 190 665 202C744 214 804 194 860 188V230H0Z"/>
  <g class="wipe">
    <path class="ink" d="M0 90C45 74 82 103 128 86C177 68 212 105 263 82V121C207 139 178 101 125 125C74 148 40 111 0 130Z"/>
  </g>
  <text class="title" x="430" y="55" text-anchor="middle">TROPHY BOARD / FRAME ROLL</text>

  <g transform="translate(61 78)">
    <g class="t1">
      <rect class="shadow" x="7" y="9" width="106" height="80" rx="7"/>
      <rect class="card" x="0" y="0" width="106" height="80" rx="7"/>
      <path class="pink" d="M53 14L61 33L82 34L66 47L71 68L53 57L35 68L40 47L24 34L45 33Z"/>
      <text class="text" x="53" y="73" text-anchor="middle">COMMITS</text>
    </g>
    <g class="t2">
      <rect class="shadow" x="133" y="9" width="106" height="80" rx="7"/>
      <rect class="card" x="126" y="0" width="106" height="80" rx="7"/>
      <path class="cyan" d="M179 14L187 33L208 34L192 47L197 68L179 57L161 68L166 47L150 34L171 33Z"/>
      <text class="text" x="179" y="73" text-anchor="middle">STARS</text>
    </g>
    <g class="t3">
      <rect class="shadow" x="259" y="9" width="106" height="80" rx="7"/>
      <rect class="card" x="252" y="0" width="106" height="80" rx="7"/>
      <path class="green" d="M305 14L313 33L334 34L318 47L323 68L305 57L287 68L292 47L276 34L297 33Z"/>
      <text class="text" x="305" y="73" text-anchor="middle">REPOS</text>
    </g>
    <g class="t4">
      <rect class="shadow" x="385" y="9" width="106" height="80" rx="7"/>
      <rect class="card" x="378" y="0" width="106" height="80" rx="7"/>
      <path class="pink" d="M431 14L439 33L460 34L444 47L449 68L431 57L413 68L418 47L402 34L423 33Z"/>
      <text class="text" x="431" y="73" text-anchor="middle">PRS</text>
    </g>
    <g class="t5">
      <rect class="shadow" x="511" y="9" width="106" height="80" rx="7"/>
      <rect class="card" x="504" y="0" width="106" height="80" rx="7"/>
      <path class="cyan" d="M557 14L565 33L586 34L570 47L575 68L557 57L539 68L544 47L528 34L549 33Z"/>
      <text class="text" x="557" y="73" text-anchor="middle">ISSUES</text>
    </g>
    <g class="t6">
      <rect class="shadow" x="637" y="9" width="106" height="80" rx="7"/>
      <rect class="card" x="630" y="0" width="106" height="80" rx="7"/>
      <path class="green" d="M683 14L691 33L712 34L696 47L701 68L683 57L665 68L670 47L654 34L675 33Z"/>
      <text class="text" x="683" y="73" text-anchor="middle">FOLLOW</text>
    </g>
  </g>

  <circle class="pink s1" cx="110" cy="178" r="6"/>
  <circle class="cyan s2" cx="430" cy="178" r="6"/>
  <circle class="green s3" cx="750" cy="178" r="6"/>
  <text class="small" x="430" y="203" text-anchor="middle">LIVE TROPHIES BELOW / ANIMATED BOARD ABOVE</text>
</svg>
