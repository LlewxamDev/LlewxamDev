<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 260" width="860" height="260" role="img" aria-labelledby="title desc">
  <title id="title">Animated project reel</title>
  <desc id="desc">Frame-by-frame black and white ink film reel showing the main projects in the profile.</desc>
  <defs>
    <style>
      .paper { fill: #0A0610; }
      .ink { fill: #F2EAFB; }
      .soft { fill: #F2EAFB; opacity: .1; }
      .frame { fill: #0A0610; stroke: #F2EAFB; stroke-width: 2.4; }
      .label { font-family: 'Courier New', Courier, monospace; font-size: 11px; font-weight: 900; fill: #F2EAFB; letter-spacing: 1px; }
      .name { font-family: 'Courier New', Courier, monospace; font-size: 23px; font-weight: 900; fill: #F2EAFB; letter-spacing: 1px; }
      .meta { font-family: 'Courier New', Courier, monospace; font-size: 12px; font-weight: 800; fill: #F2EAFB; }
      .small { font-family: 'Courier New', Courier, monospace; font-size: 10px; font-weight: 900; fill: #0A0610; letter-spacing: 2px; }
      .cyan { fill: #7B2CBF; }
      .pink { fill: #C77DFF; }
      .green { fill: #9D4EDD; }
      .line { stroke: #F2EAFB; stroke-width: 2; stroke-linecap: round; fill: none; }
      @keyframes flip {
        0%, 100% { opacity: .72; transform: translateY(0) rotate(0deg); }
        45% { opacity: 1; transform: translateY(-5px) rotate(-.7deg); }
      }
      @keyframes brush {
        0% { transform: translateX(-260px); opacity: 0; }
        20% { opacity: .88; }
        80% { opacity: .88; }
        100% { transform: translateX(900px); opacity: 0; }
      }
      @keyframes blink {
        0%, 100% { opacity: .22; }
        50% { opacity: 1; }
      }
      .f1 { animation: flip 2.8s steps(2, end) infinite; }
      .f2 { animation: flip 2.8s steps(2, end) .2s infinite; }
      .f3 { animation: flip 2.8s steps(2, end) .4s infinite; }
      .f4 { animation: flip 2.8s steps(2, end) .6s infinite; }
      .wipe { animation: brush 5.2s linear infinite; }
      .b1 { animation: blink 2.4s steps(2, end) infinite; }
      .b2 { animation: blink 2.4s steps(2, end) .4s infinite; }
      .b3 { animation: blink 2.4s steps(2, end) .8s infinite; }
    </style>
  </defs>
  <rect class="paper" width="860" height="260"/>
  <path class="ink" d="M0 0H860V28C792 18 733 35 660 24C580 11 510 38 431 23C352 8 291 11 220 28C139 47 72 17 0 35Z"/>
  <path class="ink" d="M0 228C80 236 130 216 210 231C292 247 356 224 431 234C515 245 582 219 660 232C745 246 802 226 860 220V260H0Z"/>
  <rect class="ink" x="0" y="45" width="38" height="160"/>
  <rect class="ink" x="822" y="45" width="38" height="160"/>
  <text class="small" x="19" y="132" text-anchor="middle" transform="rotate(-90 19 132)">PROJECT REEL</text>
  <text class="small" x="841" y="132" text-anchor="middle" transform="rotate(90 841 132)">SCENES</text>

  <g class="wipe">
    <path class="ink" d="M38 73C85 56 126 86 174 68C222 50 260 88 310 66V111C254 130 223 89 171 112C118 135 82 101 38 123Z"/>
  </g>

  <g transform="translate(58 56)">
    <g class="f1">
      <rect class="frame" x="0" y="0" width="174" height="132" rx="5"/>
      <path class="soft" d="M8 35C50 16 83 48 126 29C146 20 161 22 166 24V62C128 73 103 48 69 67C40 83 21 71 8 75Z"/>
      <circle class="pink b1" cx="26" cy="26" r="7"/>
      <text class="label" x="18" y="18">001</text>
      <text class="name" x="87" y="62" text-anchor="middle">AegisHub</text>
      <text class="meta" x="87" y="86" text-anchor="middle">security analyzer</text>
      <text class="meta" x="87" y="105" text-anchor="middle">Rust / TS / React</text>
    </g>
    <g class="f2">
      <rect class="frame" x="190" y="0" width="174" height="132" rx="5"/>
      <path class="soft" d="M198 84C244 60 281 96 326 73C346 62 358 66 356 71V107C321 118 296 91 260 111C230 128 210 111 198 118Z"/>
      <circle class="cyan b2" cx="216" cy="26" r="7"/>
      <text class="label" x="208" y="18">002</text>
      <text class="name" x="277" y="62" text-anchor="middle">AegisCore</text>
      <text class="meta" x="277" y="86" text-anchor="middle">defensive platform</text>
      <text class="meta" x="277" y="105" text-anchor="middle">TS / Rust / API</text>
    </g>
    <g class="f3">
      <rect class="frame" x="380" y="0" width="174" height="132" rx="5"/>
      <path class="soft" d="M388 36C429 17 462 48 504 29C527 18 542 21 546 26V62C510 72 481 48 448 66C419 82 400 72 388 76Z"/>
      <circle class="green b3" cx="406" cy="26" r="7"/>
      <text class="label" x="398" y="18">003</text>
      <text class="name" x="467" y="62" text-anchor="middle">HackerPage</text>
      <text class="meta" x="467" y="86" text-anchor="middle">interactive security</text>
      <text class="meta" x="467" y="105" text-anchor="middle">HTML5 / CSS3 / 3D</text>
    </g>
    <g class="f4">
      <rect class="frame" x="570" y="0" width="174" height="132" rx="5"/>
      <path class="soft" d="M578 86C622 59 659 98 704 74C727 61 741 66 736 73V108C701 118 676 92 640 112C610 129 590 112 578 119Z"/>
      <circle class="pink b1" cx="596" cy="26" r="7"/>
      <text class="label" x="588" y="18">004</text>
      <text class="name" x="657" y="62" text-anchor="middle">Portf-lio</text>
      <text class="meta" x="657" y="86" text-anchor="middle">cinematic web</text>
      <text class="meta" x="657" y="105" text-anchor="middle">React / Vite / Motion</text>
    </g>
  </g>
  <path class="line" d="M66 214C126 191 176 224 235 203C292 183 349 219 409 201C469 182 523 216 585 199C644 183 705 210 793 194"/>
  <text class="label" x="430" y="236" text-anchor="middle">EVERY PROJECT IS A SCENE / EVERY COMMIT IS A FRAME</text>
</svg>
