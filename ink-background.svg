<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 230" width="860" height="230" role="img" aria-labelledby="title desc">
  <title id="title">Full README ink background concept</title>
  <desc id="desc">A black and white ink film-sheet SVG used to visually connect the whole GitHub profile README.</desc>
  <defs>
    <style>
      .paper { fill: #0A0610; }
      .ink { fill: #F2EAFB; }
      .soft { fill: #F2EAFB; opacity: .14; }
      .line { stroke: #F2EAFB; stroke-width: 2; stroke-linecap: round; fill: none; }
      .hair { stroke: #F2EAFB; stroke-width: 1; stroke-linecap: round; fill: none; opacity: .55; }
      .title { font-family: 'Courier New', Courier, monospace; font-size: 34px; font-weight: 900; letter-spacing: 5px; fill: #F2EAFB; }
      .sub { font-family: 'Courier New', Courier, monospace; font-size: 12px; font-weight: 800; letter-spacing: 2px; fill: #F2EAFB; }
      .keyword { font-family: 'Courier New', Courier, monospace; font-size: 13px; font-weight: 900; letter-spacing: 1px; fill: #F2EAFB; }
      .small { font-family: 'Courier New', Courier, monospace; font-size: 10px; font-weight: 800; fill: #0A0610; letter-spacing: 2px; }
      .cyan { fill: #7B2CBF; }
      .pink { fill: #C77DFF; }
      .green { fill: #9D4EDD; }
      @keyframes pass {
        0% { transform: translateX(-220px); opacity: 0; }
        18% { opacity: .88; }
        80% { opacity: .88; }
        100% { transform: translateX(920px); opacity: 0; }
      }
      @keyframes pulse {
        0%, 100% { opacity: .22; transform: scale(1); }
        50% { opacity: .75; transform: scale(1.08); }
      }
      @keyframes drift {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(8px); }
      }
      .wipe { animation: pass 5.4s linear infinite; }
      .p1 { animation: pulse 2.8s steps(2, end) infinite; }
      .p2 { animation: pulse 2.8s steps(2, end) .45s infinite; }
      .p3 { animation: pulse 2.8s steps(2, end) .9s infinite; }
      .d1 { animation: drift 3.4s ease-in-out infinite; }
      .d2 { animation: drift 4s ease-in-out .35s infinite; }
      .d3 { animation: drift 3.7s ease-in-out .7s infinite; }
    </style>
  </defs>
  <rect class="paper" width="860" height="230"/>

  <path class="ink" d="M0 0H860V28C779 20 723 43 643 25C561 7 492 42 413 25C333 8 269 7 197 27C120 49 68 14 0 34Z"/>
  <path class="ink" d="M0 196C68 208 128 184 196 199C276 217 326 190 404 203C484 217 556 188 633 201C714 214 781 195 860 188V230H0Z"/>
  <rect class="ink" x="0" y="38" width="46" height="150"/>
  <rect class="ink" x="814" y="38" width="46" height="150"/>

  <g>
    <rect class="paper" x="13" y="50" width="19" height="13"/>
    <rect class="paper" x="13" y="78" width="19" height="13"/>
    <rect class="paper" x="13" y="106" width="19" height="13"/>
    <rect class="paper" x="13" y="134" width="19" height="13"/>
    <rect class="paper" x="13" y="162" width="19" height="13"/>
    <rect class="paper" x="828" y="50" width="19" height="13"/>
    <rect class="paper" x="828" y="78" width="19" height="13"/>
    <rect class="paper" x="828" y="106" width="19" height="13"/>
    <rect class="paper" x="828" y="134" width="19" height="13"/>
    <rect class="paper" x="828" y="162" width="19" height="13"/>
  </g>

  <path class="soft" d="M72 70C142 44 196 83 264 61C336 37 390 80 462 57C537 34 593 78 669 55C724 38 773 47 814 39V79C757 89 709 74 652 90C579 111 522 69 453 93C376 119 322 77 250 101C181 124 128 88 72 111Z"/>
  <path class="line" d="M76 126C145 104 199 141 268 120C337 99 392 137 463 116C533 95 596 133 670 113C724 98 770 104 814 96"/>
  <path class="hair" d="M88 154C121 145 153 159 184 150M224 160C270 143 317 162 361 148M410 158C455 144 499 161 546 149M594 160C645 144 698 158 750 145"/>

  <g class="wipe">
    <path class="ink" d="M46 88C88 73 128 99 169 84C211 68 247 99 288 80V119C242 133 211 103 166 122C119 141 84 112 46 129Z"/>
  </g>

  <circle class="pink p1" cx="130" cy="55" r="7"/>
  <circle class="cyan p2" cx="731" cy="64" r="6"/>
  <circle class="green p3" cx="414" cy="169" r="6"/>
  <circle class="ink d1" cx="98" cy="37" r="4"/>
  <circle class="ink d2" cx="769" cy="35" r="5"/>
  <circle class="ink d3" cx="609" cy="205" r="4"/>

  <text class="small" x="22" y="119" text-anchor="middle" transform="rotate(-90 22 119)">FRAME ROLL</text>
  <text class="small" x="838" y="119" text-anchor="middle" transform="rotate(90 838 119)">INK PASS</text>
  <text class="title" x="430" y="92" text-anchor="middle">LLEWXAM</text>
  <text class="keyword" x="430" y="122" text-anchor="middle">AEGISHUB / AEGISCORE / DEFENSIVE SECURITY / FULL-STACK SYSTEMS</text>
  <text class="sub" x="430" y="148" text-anchor="middle">POLYGLOT ENGINEERING / JS-TS FRAMEWORKS / 3D WEB MOTION / TOOLING</text>
</svg>
