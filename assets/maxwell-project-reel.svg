<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Maxwell project mission board</title>
  <desc id="desc">Animated cyberpunk project reel for Maxwell profile README.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050510" />
      <stop offset="52%" stop-color="#070A12" />
      <stop offset="100%" stop-color="#180733" />
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00F5FF" />
      <stop offset="35%" stop-color="#FF2ED1" />
      <stop offset="72%" stop-color="#FCEE09" />
      <stop offset="100%" stop-color="#FF003C" />
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#00F5FF" stroke-opacity="0.10" />
    </pattern>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.6" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <style><![CDATA[
      .mono { font-family: Consolas, Monaco, 'Courier New', monospace; }
      .title { font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif; letter-spacing: 3px; }
      .dash { stroke-dasharray: 24 12; animation: dash 9s linear infinite; }
      .scan { animation: scan 4s linear infinite; }
      .pulseA { animation: pulse 3.2s ease-in-out infinite; }
      .pulseB { animation: pulse 3.2s ease-in-out infinite .4s; }
      .pulseC { animation: pulse 3.2s ease-in-out infinite .8s; }
      .pulseD { animation: pulse 3.2s ease-in-out infinite 1.2s; }
      .slide { animation: slide 8s ease-in-out infinite; }
      @keyframes dash { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -420; } }
      @keyframes scan { from { transform: translateX(-1200px); } to { transform: translateX(1200px); } }
      @keyframes pulse { 0%,100% { opacity: .62; } 50% { opacity: 1; } }
      @keyframes slide { 0%,100% { transform: translateX(0); } 50% { transform: translateX(22px); } }
    ]]></style>
  </defs>

  <rect width="1200" height="430" fill="url(#bg)" />
  <rect width="1200" height="430" fill="url(#grid)" opacity="0.85" />
  <rect x="24" y="24" width="1152" height="382" rx="22" fill="#050510" fill-opacity="0.42" stroke="url(#edge)" stroke-width="2" />
  <rect class="scan" x="-220" y="24" width="220" height="382" fill="url(#edge)" opacity="0.07" />

  <text class="title" x="600" y="76" text-anchor="middle" fill="#EAF2FF" font-size="44">PROJECT FILES</text>
  <text class="mono" x="600" y="104" text-anchor="middle" fill="#FCEE09" font-size="15">SELECTED MISSIONS / PLACEHOLDER BOARD / REPLACE WITH REAL BUILDS</text>

  <g transform="translate(62 142)">
    <g class="pulseA">
      <rect x="0" y="0" width="250" height="206" rx="16" fill="#070A12" stroke="#00F5FF" stroke-width="1.7" filter="url(#glow)" />
      <path class="dash" d="M18 18H232V188H18Z" fill="none" stroke="#00F5FF" stroke-width="1" opacity="0.8" />
      <text class="mono" x="24" y="44" fill="#FCEE09" font-size="14">PROJECT 01</text>
      <text class="title" x="24" y="82" fill="#EAF2FF" font-size="26">CYBER SYSTEM</text>
      <text class="mono" x="24" y="118" fill="#00F5FF" font-size="14">STATUS: BUILDING</text>
      <text class="mono" x="24" y="146" fill="#9BA7C0" font-size="13">TypeScript / Node / React</text>
      <text class="mono" x="24" y="176" fill="#EAF2FF" font-size="12">Automating chaos into structure.</text>
    </g>

    <g class="pulseB" transform="translate(276 0)">
      <rect x="0" y="0" width="250" height="206" rx="16" fill="#070A12" stroke="#FF2ED1" stroke-width="1.7" filter="url(#glow)" />
      <path class="dash" d="M18 18H232V188H18Z" fill="none" stroke="#FF2ED1" stroke-width="1" opacity="0.8" />
      <text class="mono" x="24" y="44" fill="#FCEE09" font-size="14">PROJECT 02</text>
      <text class="title" x="24" y="82" fill="#EAF2FF" font-size="26">VISUAL EXP</text>
      <text class="mono" x="24" y="118" fill="#FF2ED1" font-size="14">STATUS: EXPERIMENTAL</text>
      <text class="mono" x="24" y="146" fill="#9BA7C0" font-size="13">Blender / AE / Motion</text>
      <text class="mono" x="24" y="176" fill="#EAF2FF" font-size="12">Impact, particles and overload.</text>
    </g>

    <g class="pulseC" transform="translate(552 0)">
      <rect x="0" y="0" width="250" height="206" rx="16" fill="#070A12" stroke="#FCEE09" stroke-width="1.7" filter="url(#glow)" />
      <path class="dash" d="M18 18H232V188H18Z" fill="none" stroke="#FCEE09" stroke-width="1" opacity="0.8" />
      <text class="mono" x="24" y="44" fill="#00F5FF" font-size="14">PROJECT 03</text>
      <text class="title" x="24" y="82" fill="#EAF2FF" font-size="25">MUSIC WORLD</text>
      <text class="mono" x="24" y="118" fill="#FCEE09" font-size="14">STATUS: RISING</text>
      <text class="mono" x="24" y="146" fill="#9BA7C0" font-size="13">Music / Visuals / Lore</text>
      <text class="mono" x="24" y="176" fill="#EAF2FF" font-size="12">Songs and visuals people remember.</text>
    </g>

    <g class="pulseD" transform="translate(828 0)">
      <rect x="0" y="0" width="250" height="206" rx="16" fill="#070A12" stroke="#FF003C" stroke-width="1.7" filter="url(#glow)" />
      <path class="dash" d="M18 18H232V188H18Z" fill="none" stroke="#FF003C" stroke-width="1" opacity="0.8" />
      <text class="mono" x="24" y="44" fill="#FCEE09" font-size="14">PROJECT 04</text>
      <text class="title" x="24" y="82" fill="#EAF2FF" font-size="25">FULL-STACK</text>
      <text class="mono" x="24" y="118" fill="#FF003C" font-size="14">STATUS: PROTOTYPE</text>
      <text class="mono" x="24" y="146" fill="#9BA7C0" font-size="13">JavaScript / SQL / API</text>
      <text class="mono" x="24" y="176" fill="#EAF2FF" font-size="12">Solving real problems with style.</text>
    </g>
  </g>

  <g class="slide mono" fill="#00F5FF" font-size="12" opacity="0.82">
    <text x="74" y="388">SIGNAL: LOCKED</text>
    <text x="980" y="388">NEXT MISSION LOADING</text>
  </g>
</svg>
